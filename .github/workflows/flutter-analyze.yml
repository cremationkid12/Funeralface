name: Flutter analyze and test

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - phase/**

jobs:
  analyze:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: |
          dart test test/core test/features
          flutter test test/widget_test.dart
